<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Canvas PNG Generator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Boldonse&family=Inter+Tight:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" />

  <!-- CSS lama tetap dipakai -->
  <link rel="stylesheet" href="assets/css/styles.css" />

  <style>
    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
    }

    .app{
      width:100%;
      max-width:600px;
      display:flex;
      flex-direction:column;
      gap:20px;
      align-items:center;
    }

    .canvas-wrapper{
      width:100%;
      max-width:540px;
    }

    canvas{
      width:100%;
      height:auto;
      aspect-ratio:4/5;
      display:block;
      background:#fff;
      border:1px solid rgba(255,255,255,.15);
    }

    .toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
    }
  </style>
</head>

<body>

<div class="app">

  <div class="toolbar">
    <button id="generateBtn" class="btn btn--primary">
      Generate PNG
    </button>
  </div>

  <div class="canvas-wrapper">
    <canvas
      id="canvas"
      width="1080"
      height="1350">
    </canvas>
  </div>

</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function drawCanvas() {

  // Background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, 1080, 1350);

  // Header merah
  ctx.fillStyle = '#DC2626';
  ctx.fillRect(0, 0, 1080, 180);

  // Judul
  ctx.fillStyle = '#111111';
  ctx.font = 'bold 90px Arial';
  ctx.fillText('Canvas Template', 80, 380);

  // Subjudul
  ctx.font = '50px Arial';
  ctx.fillText('1080 × 1350 px', 80, 470);

  // Kotak contoh
  ctx.fillStyle = '#f3f4f6';
  ctx.fillRect(80, 560, 920, 550);

  ctx.strokeStyle = '#d1d5db';
  ctx.lineWidth = 4;
  ctx.strokeRect(80, 560, 920, 550);

  ctx.fillStyle = '#666';
  ctx.font = '40px Arial';
  ctx.fillText('Area Konten', 410, 850);
}

drawCanvas();

document
  .getElementById('generateBtn')
  .addEventListener('click', () => {

    const link = document.createElement('a');

    link.download = `canvas-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

  });
</script>

<!-- JS lama tetap dipakai -->
<script src="assets/js/site.js" defer></script>

</body>
</html>
